<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->
    <title>Family Fair Supermarket | Fresh Groceries & Daily Essentials</title>

    <meta
      name="description"
      content="Shop fresh groceries, household essentials, snacks, beverages, and family favorites at Family Fair Supermarket. Quality products with a modern shopping experience."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://familyfair.vercel.app/" />

    <meta
      name="keywords"
      content="supermarket, groceries, fresh food, family fair, shopping, vegetables, fruits, household items"
    />

    <meta 
      name="google-site-verification" 
      content="2rgDlfAFb57bcx8nW--jxTQBHM4CmyHF8XozJciKH88" 
    />

    <meta name="author" content="Family Fair Supermarket" />
    <meta name="theme-color" content="#166534" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_MW" />
    <meta property="og:site_name" content="Family Fair Supermarket" />
    <meta property="og:url" content="https://familyfair.vercel.app/" />

    <meta
      property="og:title"
      content="Family Fair Supermarket"
    />

    <meta
      property="og:description"
      content="Fresh groceries, daily essentials, and family-friendly shopping all in one place."
    />

    <meta property="og:image" content="/family.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta
      name="twitter:title"
      content="Family Fair Supermarket"
    />

    <meta
      name="twitter:description"
      content="Fresh groceries, daily essentials, and family-friendly shopping all in one place."
    />

    <meta name="twitter:image" content="/family.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/family.png" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "GroceryStore",
        "name": "Family Fair Supermarket",
        "description": "Fresh groceries, daily essentials, and family-friendly shopping in Lilongwe.",
        "url": "https://familyfair.vercel.app/",
        "image": "https://familyfair.vercel.app/family.png",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Area 36 Market Lane",
          "addressLocality": "Lilongwe",
          "addressCountry": "MW"
        },
        "telephone": "+265881146791",
        "openingHoursSpecification": [
          {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"],
            "opens": "07:00",
            "closes": "21:00"
          },
          {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": "Saturday",
            "opens": "08:00",
            "closes": "20:00"
          },
          {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": "Sunday",
            "opens": "08:30",
            "closes": "18:00"
          }
        ],
        "sameAs": ["https://www.instagram.com/familyfair2026"]
      }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Preload lazy module chunks to reduce fetch latency -->
    <link rel="modulepreload" href="/src/components/Hero.jsx">
    <link rel="modulepreload" href="/src/components/ProductsPanel.jsx">
    <link rel="modulepreload" href="/src/components/CartSidebar.jsx">
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
